name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write   # OIDC for npm provenance
  contents: write   # create GitHub release
  pages: write      # deploy to GitHub Pages

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run test:all
      - run: npm run build

      # ── Publish to npm (OIDC, no token needed) ──
      - run: npm publish --provenance --access public

      # ── Build demo page ──
      - run: npm run build:demo
        env:
          PUBLIC_BASE_PATH: /jsonschema-builder-vue/

      # ── Deploy demo to GitHub Pages ──
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo
      - uses: actions/deploy-pages@v4
        id: deploy

      # ── Changelog from commits since previous tag ──
      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "$LOG" > /tmp/changelog.txt

      # ── GitHub Release ──
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
